name: Deploy DanielScience.com
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build blog posts
        run: npm ci && npm run build
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Ensure path exists
        run: ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ secrets.DEPLOY_PATH }}"
      - name: Deploy site
        run: |
          rsync -avz --delete \
            --exclude '.git*' \
            --exclude 'README.md' \
            --exclude 'nginx-*.conf' \
            --exclude 'grafana/' \
            --exclude 'node_modules/' \
            --exclude 'posts-src/' \
            --exclude '_includes/' \
            --exclude '.eleventy.js' \
            --exclude 'package*.json' \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}/
